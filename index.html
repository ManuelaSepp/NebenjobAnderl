<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#70ad47">
<title>Arbeitszeit Nebenjob 2</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;font-family:Arial,sans-serif;color:#25303b}
.app{width:min(100%,560px);margin:auto;padding:14px}.card{background:#fff;border-radius:20px;padding:22px 20px;margin-bottom:14px;box-shadow:0 10px 28px rgba(40,54,68,.11)}
h1{text-align:center;margin:0 0 6px;font-size:25px}.subtitle{text-align:center;margin:0 0 20px;color:#667085}
label{display:block;margin:16px 0 7px;font-weight:700}input,select,textarea,button{width:100%;min-height:52px;padding:12px 14px;border:1px solid #d7dde3;border-radius:12px;background:#fff;font-size:18px}
.multi-select-wrap{position:relative}
.multi-select-button{display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left}
.multi-select-button::after{content:"▾";font-size:16px}
.multi-select-wrap.open .multi-select-button::after{content:"▴"}
.multi-select{display:none;position:absolute;z-index:20;left:0;right:0;top:calc(100% + 6px);max-height:280px;overflow:auto;padding:8px;border:1px solid #d7dde3;border-radius:12px;background:#fff;box-shadow:0 12px 28px rgba(40,54,68,.16)}
.multi-select-wrap.open .multi-select{display:grid;gap:4px}
.activity-option{display:flex;align-items:center;gap:10px;min-height:42px;margin:0;padding:8px 10px;border-radius:9px;font-weight:400}
.activity-option:hover{background:#f4f6f8}.activity-option input{width:22px;min-height:22px;margin:0;padding:0;flex:0 0 auto}
.multi-select.disabled{opacity:.55;pointer-events:none}.multi-select-button:disabled{opacity:.55}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.hidden{display:none}.hours-box{margin-top:14px;padding:14px;border-radius:12px;background:#eef3f7;text-align:center;font-weight:700}
.button-row{display:grid;gap:10px;margin-top:24px}.button-row.edit-mode{grid-template-columns:1fr 1fr}.button-row button{border:0;color:white;font-weight:700}
#saveButton,#updateButton{background:#70ad47}#deleteButton{background:#c94c4c}#cancelButton{background:#7b8794}.secondary-row{display:none;grid-column:1/-1}.edit-mode .secondary-row{display:block}
#meldung{text-align:center;min-height:24px;margin-top:14px;font-weight:700}.success{color:#337a19}.error{color:#b42318}
details.card{padding:0;overflow:hidden}summary{padding:18px 20px;font-size:19px;font-weight:700;cursor:pointer}.content{padding:0 20px 22px}
.calendar-head{display:flex;align-items:center;gap:10px}.calendar-head button{width:44px;padding:0}.calendar-head div{flex:1;text-align:center;font-weight:700}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}.day-name{text-align:center;font-size:12px;font-weight:700}.day-cell{min-height:48px;padding:5px 2px;border:1px solid #dce2e7;border-radius:10px}.empty{visibility:hidden}.today{box-shadow:inset 0 0 0 2px #4a90e2}.selected{outline:3px solid #20252b}.status-arbeit{background:#dceeff}.status-abwesenheit{background:#dff3d2}.day-number{display:block;font-weight:700}.status-label{display:block;font-size:9px;margin-top:3px}
.week-box{padding:14px;background:#eef3f7;border-radius:14px;text-align:center;margin-bottom:14px}.calendar-tooltip{position:fixed;z-index:9999;display:none;max-width:min(300px,calc(100vw - 24px));padding:10px 12px;border-radius:10px;background:#25303b;color:#fff;font-size:13px;line-height:1.4;white-space:pre-line;text-align:left;box-shadow:0 8px 24px rgba(0,0,0,.25);pointer-events:none}.calendar-tooltip.visible{display:block}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{padding:14px;background:#f7f8fa;border:1px solid #e3e7eb;border-radius:12px;text-align:center}.stat strong{font-size:22px;display:block}.plus{color:#337a19}.minus{color:#b42318}
@media(max-width:420px){.app{padding:8px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="app">
<section class="card">
<h1>Arbeitszeit Nebenjob 2</h1>
<p class="subtitle">6 Sollstunden pro Woche</p>
<form id="entryForm">
<label for="datum">Datum</label><input type="date" id="datum" required>
<label>Tätigkeiten</label>
<div id="taetigkeitenDropdown" class="multi-select-wrap">
<button id="taetigkeitenButton" class="multi-select-button" type="button">Bitte wählen</button>
<div id="taetigkeitenListe" class="multi-select"></div>
</div>
<div id="freieBox" class="hidden"><label for="freieTaetigkeit">Weitere Tätigkeit</label><input id="freieTaetigkeit" type="text" placeholder="Weitere Tätigkeit eintragen"></div>
<div class="row">
<div><label for="beginn">Beginn</label><input type="time" id="beginn" value="07:00"></div>
<div><label for="ende">Ende</label><input type="time" id="ende" value="13:00"></div>
</div>
<div class="hours-box">Berechnete Stunden: <span id="stundenAnzeige">6</span></div>
<label for="abwesenheit">Abwesenheit</label>
<select id="abwesenheit"><option value="">Keine</option><option>Urlaub</option><option>Krank</option></select>
<label for="notiz">Notiz (optional)</label><textarea id="notiz"></textarea>
<div id="buttonRow" class="button-row">
<button id="saveButton" type="submit">Speichern</button>
<button id="updateButton" type="button" hidden>Ändern</button>
<button id="deleteButton" type="button" hidden>Löschen</button>
<div class="secondary-row"><button id="cancelButton" type="button">Bearbeitung abbrechen</button></div>
</div>
<div id="meldung"></div>
</form>
</section>
<details class="card" open><summary>Kalender</summary><div class="content">
<div id="weekBox" class="week-box"></div>
<div class="calendar-head"><button id="prevMonth" type="button">‹</button><div id="monthLabel"></div><button id="nextMonth" type="button">›</button></div>
<div id="calendarGrid" class="calendar-grid"></div>
</div></details>
<details class="card" open><summary>Zeitkonto</summary><div class="content"><div class="stats">
<div class="stat"><strong id="statStunden">0</strong><span>Stunden im Monat</span></div>
<div class="stat"><strong id="statSaldo">0</strong><span>Gesamtsaldo</span></div>
</div></div></details>
</main>
<div id="calendarTooltip" class="calendar-tooltip" role="tooltip"></div>
<script src="app.js?v=9"></script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("./service-worker.js").catch(console.error)}</script>
</body></html>
